# Gatilhos → coluna ESTATAL (valores iguais à planilha).
#
# Fluxo (ver `estatal_matching.py`):
#  1) Estes gatilhos aplicam-se ao **nome** do arquivo; o mais longo que bater define a estatal.
#  2) Se não bater, fuzzy só no nome.
#  3) Se ainda não bater, lê-se o PDF (texto nativo + OCR quando necessário) e aplicam-se
#     **os mesmos** gatilhos ao texto extraído.
#
# Inclua aqui tanto abreviações típicas de nomes de arquivo quanto frases que só aparecem no corpo
# do PDF (ex.: "banco nacional de desenvolvimento economico" para PDFs com nome genérico).

substrings:
  ABGF: [abgf]
  Amazul: [amazul]
  BASA: [basa, "banco da amaz", "banco-da-amaz"]
  BB: [bb act, "bb -"]
  BNB: [bnb, act-bnb]
  BNDES:
    - bndes
    - banco nacional de desenvolvimento economico
  CBTU: [cbtu]
  CDC: [cdc]
  CDP: [cdp]
  CDRJ: [cdrj]
  CMB (Casa da Moeda): [cmb, moeda]
  CPRM (SGB):
    - cprm
    - companhia de pesquisa de recursos minerais
    - servico geologico do brasil
  Caixa: [caixa]
  Ceagesp:
    - ceagesp
    - companhia de entrepostos e armazens gerais de sao paulo
  CeasaMinas: [ceasaminas]
  Codeba: [codeba]
  Codern: [codern]
  Codevasf: [codevasf]
  Conab: [conab]
  Correios:
    - correios
    - empresa brasileira de correios e telegrafos
    - correios e telegrafos
  Dataprev: [dataprev]
  EBC: [ebc]
  ENBPar (Eletronuclear): [eletronuclear]
  ENBPar (INB): [inb_pcs, inb pcs, inb-pcs]
  EPE: [epe, empresa de pesquisa energetica]
  Ebserh: [ebserh]
  Embrapa: [embrapa]
  Emgea: [emgea, empresa gestora de ativos, emgea.gov]
  Emgepron: [emgepron]
  Finep: [finep, financiadora de estudos e projetos]
  GHC (Conceição): [ghc]
  HCPA: [hcpa, hospital de clinicas de porto alegre]
  Hemobrás:
    - hemobr
    - hemoderivados
    - brasileira de hemoderivados
  Imbel: [imbel]
  Infra S/A (Valec): [valec]
  Infraero:
    - infraero
    - acordo coletivo de trabalho infraero
  NAV Brasil: [nav-brasil, nav_brasil, nav brasil]
  Nuclep: [nuclep]
  PPSA: [ppsa]
  Petrobras: [petrobras, plano petros]
  SPA:
    - "spa("
    - santos port
    - autoridade portuaria de santos
    - autoridade portuaria de santos s.a
    - "aps, cnpj"
  Serpro: [serpro]
  Telebras: [telebras, telecomunicacoes brasileiras]
  Trensurb: [trensurb]
