# Ligação arquivo PDF ↔ coluna ESTATAL de Dados Estatais.xlsx (nome exato da célula).
#
# NPCS = Novo Plano de Cargos e Salários (instrumento). O PDF abaixo foi confirmado como BNDES.
#
# substrings: trechos no nome do arquivo (minúsculas / sem acentos na comparação).
# arquivo_para_estatal: só pares arquivo → ESTATAL confirmados (PDF/SEI).

arquivo_para_estatal:
  "NPCS_2025_versão+site_com+regulamento.pdf": "BNDES"

substrings:
  ABGF: [abgf]
  Amazul: [amazul]
  BASA: [basa, "banco da amaz", "banco-da-amaz"]
  BB: [bb act, "bb -"]
  BNB: [bnb, act-bnb]
